name: NVDA Multi-Timeframe Rule of Thirds

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC.
    # Runs every 15 minutes Monday-Friday across a broad U.S. market-hours window.
    # This covers daylight saving and standard-time shifts.
    - cron: "*/15 13-22 * * 1-5"

permissions:
  contents: write

jobs:
  calculate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Calculate NVDA multi-timeframe Rule of Thirds
        run: python calculate_rule_of_thirds.py --symbol NVDA --days 10 --recent-candles 10

      - name: Commit updated results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html results/latest.md results/last_results.md results/history.csv results/data.json
          if git diff --cached --quiet; then
            echo "No result changes to commit."
          else
            git commit -m "Update NVDA rule of thirds"
            git push
          fi
