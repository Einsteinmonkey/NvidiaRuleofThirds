name: NVDA 4H Rule of Thirds

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC.
    # These runs update after the main regular-session 4-hour candles close.
    - cron: "45 18 * * 1-5"
    - cron: "15 21 * * 1-5"

permissions:
  contents: write

jobs:
  calculate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Calculate NVDA 4H Rule of Thirds
        run: python calculate_rule_of_thirds.py --symbol NVDA --days 10

      - name: Commit updated results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html results/latest.md results/last_10.md results/history.csv results/chart_data.json
          if git diff --cached --quiet; then
            echo "No result changes to commit."
          else
            git commit -m "Update NVDA 4H rule of thirds"
            git push
          fi
