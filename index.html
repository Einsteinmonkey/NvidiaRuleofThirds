<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NVDA Multi-Timeframe Rule of Thirds</title>
  <style>
    :root { color-scheme: dark; --bg: #0b1118; --card: #151c25; --border: #2a3442; --text: #f4f7fb; --muted: #a9b6c8; --accent: #8fc7ff; }
    * { box-sizing: border-box; }
    body { margin: 0; background: radial-gradient(circle at top, #17202d 0, var(--bg) 38%, #080d13 100%); color: var(--text); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; line-height: 1.45; }
    main { max-width: 1180px; margin: 0 auto; padding: 36px 22px 56px; }
    h1 { font-size: clamp(2.3rem, 6vw, 5rem); line-height: .95; margin: 0 0 12px; letter-spacing: -0.06em; }
    .subtitle { margin: 0 0 26px; color: var(--muted); font-size: 1.05rem; }
    .notice { padding: 22px; color: var(--muted); background: rgba(21, 28, 37, .9); border: 1px solid var(--border); border-radius: 20px; box-shadow: 0 18px 60px rgba(0,0,0,.25); }
    footer { color: var(--muted); margin-top: 28px; font-size: .9rem; }
  </style>
</head>
<body>
  <main>
    <h1>NVDA Rule of Thirds</h1>
    <p class="subtitle">15M, 30M, 1H, and 4H candles. Results update automatically from closed regular-session candles.</p>
    <div class="notice">No result yet. Run the GitHub Action once and this page will update automatically with the latest results.</div>
    <footer>Data source: Yahoo Finance chart data · Not financial advice.</footer>
  </main>
</body>
</html>
